name: Salesforce DevOps Pipeline (Flxbl Aligned)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Create Artifact
        run: |
          mkdir artifact
          cp -r force-app artifact/

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: salesforce-artifact
          path: artifact/

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # ✅ FIX ADDED
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: salesforce-artifact
          path: artifact

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate Dev Org
        run: echo "${{ secrets.SF_AUTH_URL }}" > auth.txt

      - name: Login Dev
        run: sf org login sfdx-url --sfdx-url-file auth.txt --alias DevPOC

      - name: Deploy to DevPOC
        run: sf deploy metadata --source-dir artifact/force-app --target-org DevPOC

  deploy-qa:
    needs: deploy-dev
    runs-on: ubuntu-latest

    steps:
      # ✅ FIX ADDED
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Artifact
        uses: actions/download-artifact@v3
        with:
          name: salesforce-artifact
          path: artifact

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Authenticate QA Org
        run: echo "${{ secrets.QA_AUTH_URL }}" > auth.txt

      - name: Login QA
        run: sf org login sfdx-url --sfdx-url-file auth.txt --alias QA

      - name: Deploy to QA
        run: sf deploy metadata --source-dir artifact/force-app --target-org QA